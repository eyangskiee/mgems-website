<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MGEMS — Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>

    /* ════════════════════════════════════
       ROOT & RESET
    ════════════════════════════════════ */
    :root {
      --red:       #c0001c;
      --red-dark:  #8a0013;
      --red-glow:  rgba(192, 0, 28, 0.45);
      --white:     #ffffff;
      --off-white: #f2f2f2;
      --glass-bg:  rgba(8, 14, 30, 0.72);
      --glass-border: rgba(255,255,255,0.10);
      --input-bg:  rgba(255,255,255,0.06);
      --input-border: rgba(255,255,255,0.18);
      --font-d: 'Bebas Neue', sans-serif;
      --font-b: 'Barlow', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font-b); overflow: hidden; }

    /* ════════════════════════════════════
       BACKGROUND
    ════════════════════════════════════ */
    .bg {
      position: fixed;
      inset: 0;
      background: url('assets/loginbackground.png') center/cover no-repeat;
      z-index: 0;
    }

    /* Dark + red tint overlay */
    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(4, 8, 20, 0.82) 0%,
        rgba(120, 0, 14, 0.38) 50%,
        rgba(4, 8, 20, 0.88) 100%
      );
    }

    /* Animated scanline shimmer */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
    }

    /* Floating red orb */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      z-index: 0;
      opacity: 0.35;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .orb-1 { width: 420px; height: 420px; background: var(--red); top: -80px; right: -80px; }
    .orb-2 { width: 300px; height: 300px; background: #1a0030; bottom: -60px; left: -60px; animation-delay: -7s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* ════════════════════════════════════
       MAIN LAYOUT
    ════════════════════════════════════ */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ════════════════════════════════════
       LOGIN CARD
    ════════════════════════════════════ */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 4px;
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      box-shadow:
        0 32px 80px rgba(0,0,0,0.6),
        0 0 0 1px rgba(192,0,28,0.18),
        inset 0 1px 0 rgba(255,255,255,0.07);
      padding: 44px 40px 40px;
      animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
      position: relative;
      overflow: hidden;
    }

    /* Red top bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--red-dark), var(--red), var(--red-dark));
      animation: shimmer 3s linear infinite;
      background-size: 200% 100%;
    }

    /* Subtle inner glow */
    .card::after {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 280px; height: 120px;
      background: radial-gradient(ellipse, rgba(192,0,28,0.18), transparent 70%);
      pointer-events: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(36px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── LOGO ─────────────────────────── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
      animation: logoIn 1s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    .logo-ring {
      position: relative;
      width: 100px;
      height: 100px;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1.5px solid rgba(192,0,28,0.5);
      animation: rotateBorder 8s linear infinite;
    }
    .logo-ring::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px dashed rgba(192,0,28,0.25);
      animation: rotateBorder 14s linear infinite reverse;
    }

    @keyframes rotateBorder {
      to { transform: rotate(360deg); }
    }

    .logo-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.12);
      box-shadow:
        0 0 30px var(--red-glow),
        0 8px 24px rgba(0,0,0,0.5);
      filter: drop-shadow(0 0 12px var(--red-glow));
      position: relative;
      z-index: 1;
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.7) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* ── HEADER TEXT ──────────────────── */
    .card-header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeUp 0.8s 0.35s both;
    }

    .card-org {
      font-size: 0.65rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-title {
      font-family: var(--font-d);
      font-size: 1.9rem;
      letter-spacing: 0.06em;
      color: var(--white);
      line-height: 1;
    }

    .card-sub {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.18em;
      margin-top: 6px;
      font-weight: 300;
    }

    /* ── DIVIDER ──────────────────────── */
    .hdivider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .hdivider span {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .hdivider em {
      font-style: normal;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
    }

    /* ── FORM ─────────────────────────── */
    .form { animation: fadeUp 0.8s 0.5s both; }

    .field {
      position: relative;
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 0.95rem;
      pointer-events: none;
      transition: color 0.25s;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 3px;
      padding: 13px 14px 13px 40px;
      color: var(--white);
      font-family: var(--font-b);
      font-size: 0.9rem;
      font-weight: 400;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      -webkit-autofill: none;
    }
    .field input::placeholder { color: rgba(255,255,255,0.2); }

    .field input:focus {
      border-color: var(--red);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(192,0,28,0.2), 0 0 20px rgba(192,0,28,0.1);
    }
    .field input:focus + .input-icon,
    .field input:focus ~ .input-icon { color: var(--red); }
    /* Fix: icon is before input in DOM — use sibling approach on wrap */
    .input-wrap:focus-within .input-icon { color: var(--red); }

    /* Floating label line */
    .field-line {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      width: 0;
      background: var(--red);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .field input:focus ~ .field-line { width: 100%; }

    /* ── FORGOT + REMEMBER ─────────────── */
    .form-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      user-select: none;
    }
    .remember input[type="checkbox"] { display: none; }
    .check-box {
      width: 16px; height: 16px;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.6rem;
    }
    .remember input:checked ~ .check-box {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }
    .check-box::after { content: '✓'; opacity: 0; transition: opacity 0.2s; }
    .remember input:checked ~ .check-box::after { opacity: 1; }

    .forgot {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--red); }

    /* ── LOGIN BUTTON ─────────────────── */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 3px;
      font-family: var(--font-d);
      font-size: 1.15rem;
      letter-spacing: 0.22em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 6px 24px rgba(192,0,28,0.4);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }
    .btn-login:hover::before { left: 100%; }
    .btn-login:hover {
      background: #e0001f;
      box-shadow: 0 8px 32px rgba(192,0,28,0.6);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(1px); box-shadow: none; }

    /* Loading state */
    .btn-login.loading { pointer-events: none; }
    .btn-login.loading span { opacity: 0; }
    .btn-login.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ── FOOTER ───────────────────────── */
    .card-footer {
      margin-top: 24px;
      text-align: center;
      animation: fadeUp 0.8s 0.65s both;
    }

    .card-footer p {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.12em;
    }

    .emergency-line {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      color: rgba(192,0,28,0.7);
      letter-spacing: 0.15em;
    }
    .emergency-line .dot {
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 1.4s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── BACK LINK ────────────────────── */
    .back-link {
      position: fixed;
      top: 24px;
      left: 28px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--red); }
    .back-link svg { transition: transform 0.2s; }
    .back-link:hover svg { transform: translateX(-4px); }

    /* ── ANIMATIONS ───────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ───────────────────── */
    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
    }

    /* ── INPUT AUTOFILL STYLE FIX ─────── */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgba(8,14,30,0.9) inset;
      -webkit-text-fill-color: white;
      caret-color: white;
    }

  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Back to Home -->
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to Home
  </a>

  <!-- Page -->
  <main class="page">
    <div class="card">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-ring">
          <img src="assets/logo.jpg" alt="MGEMS Logo" class="logo-img" />
        </div>
      </div>

      <!-- Header -->
      <div class="card-header">
        <div class="card-org">Committee on Emergency Response</div>
        <div class="card-title">MGEMS PORTAL</div>
        <div class="card-sub">Manuel Guianga Emergency Medical Services</div>
      </div>

      <!-- Divider -->
      <div class="hdivider">
        <span></span><em>Secure Access</em><span></span>
      </div>

      <!-- Form -->
      <form class="form" id="loginForm" autocomplete="off" onsubmit="handleLogin(event)">

        <div class="field">
          <label for="username">Username / ID</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" placeholder="Enter your username" required />
            <div class="field-line"></div>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="Enter your password" required />
            <div class="field-line"></div>
          </div>
        </div>

        <div class="form-meta">
          <label class="remember">
            <input type="checkbox" id="remember" />
            <div class="check-box"></div>
            Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span>ACCESS PORTAL</span>
        </button>

      </form>

      <!-- Card Footer -->
      <div class="card-footer">
        <p>Authorized personnel only · MGEMS © 2018</p>
        <div class="emergency-line">
          <div class="dot"></div>
          HOTLINE: 0968-628-5936 | 911
        </div>
      </div>

    </div>
  </main>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      // Simulate auth — replace with real logic
      setTimeout(() => {
        btn.classList.remove('loading');
        window.location.href = 'index.html';
      }, 1800);
    }

    // Focus-within glow on fields
    document.querySelectorAll('.field input').forEach(input => {
      input.addEventListener('focus', () => {
        input.closest('.field').querySelector('.field-line').style.width = '100%';
      });
      input.addEventListener('blur', () => {
        input.closest('.field').querySelector('.field-line').style.width = '0';
      });
    });
  </script>
</body>
</html>
